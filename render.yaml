services:

  - type: web
    name: inventory-api
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile.api

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: APP_ENV
        value: production

      - key: DEBUG
        value: "false"

      - key: PYTHONPATH
        value: /app

      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: inventory-frontend
    runtime: static
    rootDir: src/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://inventory-api-uyqy.onrender.com

databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free
