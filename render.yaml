services:

  - type: web
    name: inventory-api
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile.api

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: APP_ENV
        value: production

      - key: DEBUG
        value: "false"

      - key: PYTHONPATH
        value: /app

  - type: web
    name: inventory-frontend
    runtime: static
    buildCommand: cd src/frontend && npm install && npm run build
    staticPublishPath: src/frontend/dist

    envVars:
      - key: REACT_APP_API_URL
        value: https://inventory-api.onrender.com

databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free