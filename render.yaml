# render.yaml
# Render.com deployment configuration
# Free tier hosting for both API and frontend

services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  - type: web
    name: inventory-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHONPATH
        value: /opt/render/project/src

  # ── React Frontend ────────────────────────────────────────────────────────
  - type: web
    name: inventory-frontend
    runtime: static
    buildCommand: cd src/frontend && npm install && npm run build
    staticPublishPath: src/frontend/dist
    envVars:
      - key: REACT_APP_API_URL
        value: https://inventory-api.onrender.com

databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free